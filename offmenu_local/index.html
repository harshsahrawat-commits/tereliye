            background: 'var(--background)',

          }

  <style>
    /* CSS Variables for Theme */
    :root {
      --background: #fdfdfc;
      --foreground: #12110d;
      --color-border: #00000040;
    }

    html.dark {
      --background: #12110d;
      --foreground: #edecec;
      --color-border: #ffffff1a;
    }

    html.dark .theme-inverted {
      --background: #fdfdfc;
      --foreground: #12110d;
      --color-border: #00000040;
    }

    .theme-inverted {
      --background: #12110d;
      --foreground: #edecec;
      --color-border: #ffffff1a;
    }

    body {
      cursor: none;
      background-color: var(--background);
      color: var(--foreground);
      overflow: hidden;
      /* We are overriding scroll completely for the carousel */
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    a,
    button,
    input,
    select,
    textarea,
    .interactive {
      cursor: none !important;
    }

    /* Custom Cursor Wrapper */
    #cursor-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 99999;
      mix-blend-mode: difference;
      will-change: transform;
    }

    #cursor-dot {
      width: 10px;
      height: 10px;
      background-color: white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.3s cubic-bezier(0.25, 1, 0.5, 1), height 0.3s cubic-bezier(0.25, 1, 0.5, 1), background-color 0.3s;
      will-change: width, height;
    }

    .cursor-hover #cursor-dot {
      width: 48px;
      height: 48px;
      background-color: rgba(255, 255, 255, 1);
    }

    /* Grab cursor styling for body */
    body.grabbing #cursor-dot {
      width: 32px;
      height: 32px;
      background-color: rgba(255, 255, 255, 0.5);
    }

    /* Menu Overlay Styles */
    #nav-overlay {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 9999;
      pointer-events: none;
    }

    #nav-overlay.open {
      pointer-events: auto;
    }

    .nav-toggle-wrapper {
      pointer-events: auto;
    }

    .nav-menu-container {
      transition: width 0.3s cubic-bezier(0.85, 0, 0.15, 1), height 0.3s cubic-bezier(0.85, 0, 0.15, 1), opacity 0.2s ease;
    }

    #nav-overlay.open .nav-menu-container {
      width: 220px;
      height: auto;
      max-height: 80vh;
      opacity: 1;
      pointer-events: auto;
    }

    .nav-menu-box {
      transition: opacity 0.25s ease 0.05s, transform 0.25s ease 0.05s;
    }

    #nav-overlay.open .nav-menu-box {
      opacity: 1;
      transform: scale(1);
    }

    /* Dot Menu Toggle Morphing */
    .dot {
      transition: opacity 0.3s ease;
    }

    #nav-overlay.open .dot-2,
    #nav-overlay.open .dot-4,
    #nav-overlay.open .dot-6,
    #nav-overlay.open .dot-8 {
      opacity: 0.15 !important;
    }



    /* Heading overlay */
    .center-heading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      /* Keep it behind the closer items */
      text-align: center;
    }

    /* Floating names */
    .project-name {
      position: absolute;
      bottom: -40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.5rem;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
      pointer-events: none;
      color: var(--foreground);
    }

    .carousel-item:hover .project-name {
      opacity: 1;
    }
  </style>
</head>

  <script>
    /* =========================================================================
       1. Custom Cursor & Interactive Logic
       ========================================================================= */
    const cursorWrapper = document.getElementById('cursor-wrapper');
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let cursorX = mouseX;
    let cursorY = mouseY;

    window.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      if (cursorWrapper.style.opacity === "0") cursorWrapper.style.opacity = "1";
    });

    document.addEventListener("mouseleave", () => { cursorWrapper.style.opacity = "0"; });
    document.addEventListener("mouseenter", () => { cursorWrapper.style.opacity = "1"; });

    function bindInteractiveCursor() {
      const interactiveElements = document.querySelectorAll('a, button, input, .interactive, .carousel-item');
      interactiveElements.forEach(el => {
        el.removeEventListener('mouseenter', addHover);
        el.removeEventListener('mouseleave', removeHover);
        el.addEventListener('mouseenter', addHover);
        el.addEventListener('mouseleave', removeHover);
      });
    }

    function addHover() { cursorWrapper.classList.add('cursor-hover'); }
    function removeHover() { cursorWrapper.classList.remove('cursor-hover'); }

    function animateCursor() {
      cursorX += (mouseX - cursorX) * 0.15;
      cursorY += (mouseY - cursorY) * 0.15;
      cursorWrapper.style.transform = `translate3d(${cursorX}px, ${cursorY}px, 0)`;
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    /* =========================================================================
       2. Theme Toggle & Nav Menu
       ========================================================================= */
    const themeBtn = document.getElementById('theme-toggle-btn');
    const menuBtn = document.getElementById('menu-toggle-btn');
    const navOverlay = document.getElementById('nav-overlay');
    const htmlEl = document.documentElement;
    const moonCircle = document.getElementById('moon-mask-circle');

    themeBtn.addEventListener('click', () => {
      if (htmlEl.classList.contains('dark')) {
        htmlEl.classList.remove('dark');
        moonCircle.style.transform = 'translate(-13px, 9px)';
      } else {
        htmlEl.classList.add('dark');
        moonCircle.style.transform = 'translate(0px, 0px)';
      }
    });

    menuBtn.addEventListener('click', () => {
      navOverlay.classList.toggle('open');
    });

    // Close menu when clicking outside
    document.addEventListener('click', (e) => {
      if (navOverlay.classList.contains('open') && !navOverlay.contains(e.target) && e.target !== menuBtn && !menuBtn.contains(e.target)) {
        navOverlay.classList.remove('open');
      }
    });



    // Create DOM elements
    const itemElements = projects.map((proj, i) => {
      const a = document.createElement('a');
      a.className = 'carousel-item interactive block';
      a.href = proj.url;
      a.style.width = 'clamp(150px, 30vw, 400px)';
      a.style.height = 'clamp(150px, 30vw, 400px)';

      const img = document.createElement('img');
      img.src = proj.src;
      img.alt = proj.name;

      const name = document.createElement('div');
      name.className = 'project-name';
      name.innerText = proj.name;

      a.appendChild(img);
      a.appendChild(name);
      track.appendChild(a);
      return a;
    });

    bindInteractiveCursor();

    // Carousel Physics
    let targetRotation = 0;
    let currentRotation = 0;
    let isDragging = false;
    let startX = 0;
    let startY = 0;

    // Update positions
    function updateCarousel() {
      // Lerp rotation for smooth momentum
      currentRotation += (targetRotation - currentRotation) * 0.08;

      const total = itemElements.length;
      const maxRadius = Math.max(window.innerWidth, window.innerHeight) * 0.6;

      itemElements.forEach((el, i) => {
        // Compute position along the continuous spiral loop
        let p = (currentRotation + i) % total;
        if (p < 0) p += total; // Keep it positive

        let n = p / total; // Normalized progress from 0.0 to 1.0

        // Logarithmic Spiral / Fibonacci curve math:
        // n=0 is in the deep background (center). n=1 is in the foreground (edges).

        // Theta controls the rotation angle. Spanning 1.5 rotations (Math.PI * 3)
        // We add an offset so items sweep dramatically from the back-right to the front-left
        const angleOffset = -Math.PI / 2;
        const theta = n * Math.PI * 3 + angleOffset;

        // Exponentially expanding radius matching a Golden Spiral
        const radius = maxRadius * ((Math.exp(n * 2.5) - 1) / (Math.exp(2.5) - 1));

        // Compress the Y axis to create a 3D tilted effect
        const px = Math.cos(theta) * radius;
        const py = Math.sin(theta) * radius * 0.75;

        // Scale simulates the Z-depth (items in the center are tiny, items at edges are huge)
        const scale = 0.1 + Math.pow(n, 2.5) * 1.5;

        // Calculate Opacity:
        // Fade in gracefully from the very center abyss
        // Fade out gracefully before they leave the viewport completely
        let opacity = 1;
        if (n < 0.1) opacity = n / 0.1;
        else if (n > 0.8) opacity = (1 - n) / 0.2;

        // Apply styling
        el.style.transform = `translate(-50%, -50%) translate3d(${px}px, ${py}px, 0) scale(${scale})`;
        el.style.zIndex = Math.round(n * 100);
        el.style.opacity = opacity;
      });

      requestAnimationFrame(updateCarousel);
    }

    updateCarousel();

    // Interaction Events
    const container = document.getElementById('carousel-container');

    // Scroll (Wheel)
    window.addEventListener('wheel', (e) => {
      // Adding to targetRotation makes scrolling down bring items from background to foreground
      targetRotation += e.deltaY * 0.002;
      targetRotation += e.deltaX * 0.002;
    }, { passive: true });

    // Drag / Touch
    container.addEventListener('pointerdown', (e) => {
      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
      document.body.classList.add('grabbing');
      cursorWrapper.classList.remove('cursor-hover');
    });

    window.addEventListener('pointermove', (e) => {
      if (!isDragging) return;

      const deltaX = e.clientX - startX;
      const deltaY = e.clientY - startY;

      // Dragging moves the spiral forward or backward
      targetRotation += (deltaX - deltaY) * 0.005;

      startX = e.clientX;
      startY = e.clientY;
    });

    window.addEventListener('pointerup', () => {
      isDragging = false;
      document.body.classList.remove('grabbing');
    });

    window.addEventListener('pointerleave', () => {
      isDragging = false;
      document.body.classList.remove('grabbing');
    });

  </script>

  <!-- Neural Earth Background -->
  <script>
    // ─────────────────────────────────────────────────────────────
    //  NEURAL EARTH — Volumetric Core
    // ─────────────────────────────────────────────────────────────

    const NODES = 5000;   // Increased total neurons for dense earth map
    const RADIUS = 62;    // globe radius (world units)
    const MAX_CONN = 12;  // Lower max distance for tighter visual continents
    const N_SIGS = 350;   // More simultaneous signal pulses
    const CAM_Z = 185;    // initial camera depth
    const AUTO_ROT = 0.0016;

    const scene = new THREE.Scene();
    const H = 1400; // Fixed size for the globe
    const W = 1400;
    const camera = new THREE.PerspectiveCamera(55, W / H, 0.1, 1000);
    camera.position.z = CAM_Z;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); // transparent to blend
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0); // Fully transparent background!

    // Make it a fixed, centered element
    const canvas = renderer.domElement;
    canvas.style.position = 'fixed';
    canvas.style.top = '50%';
    canvas.style.left = '50%';
    canvas.style.transform = 'translate(-50%, -50%)';
    canvas.style.zIndex = '-10'; // Behind everything
    // Setting pointer-events to none so it doesn't block the carousel interactions
    canvas.style.pointerEvents = 'none';
    document.body.appendChild(canvas);

    const makeGlowTexture = (r, g, b, sz = 32) => {
      const c = document.createElement('canvas');
      c.width = c.height = sz;
      const ctx = c.getContext('2d');
      const h = sz / 2;
      const gr = ctx.createRadialGradient(h, h, 0, h, h, h);
      gr.addColorStop(0, `rgba(${r},${g},${b},1)`);
      gr.addColorStop(0.35, `rgba(${r},${g},${b},0.55)`);
      gr.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gr;
      ctx.fillRect(0, 0, sz, sz);
      return new THREE.CanvasTexture(c);
    };

    const earthGrp = new THREE.Group();
    scene.add(earthGrp);

    // --- Image Loading for Earth Map ---
    const img = new Image();
    img.crossOrigin = 'Anonymous';
    // Using a specular map where water is white (bright) and land is black (dark)
    img.src = 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg';

    img.onload = () => {
      const imgCanvas = document.createElement('canvas');
      imgCanvas.width = img.width;
      imgCanvas.height = img.height;
      const imgCtx = imgCanvas.getContext('2d', { willReadFrequently: true });
      imgCtx.drawImage(img, 0, 0);
      const imgData = imgCtx.getImageData(0, 0, img.width, img.height).data;

      const getEarthColor = (u, v) => {
        let x = Math.floor(u * img.width);
        let y = Math.floor(v * img.height);
        x = Math.max(0, Math.min(x, img.width - 1));
        y = Math.max(0, Math.min(y, img.height - 1));
        const idx = (y * img.width + x) * 4;

        // Specular map: brightness > 100 means water, else land
        if (imgData[idx] > 100) {
          return new THREE.Color(0.05, 0.35, 0.75); // Ocean Blue
        } else {
          return new THREE.Color(0.15, 0.55, 0.15); // Dark Grass Green
        }
      };

      const layerColor = (nR, u, v) => {
        if (nR < 0.85) {
          // Core colors for internal volumetric nodes
          if (nR < 0.25) return new THREE.Color(1.0, 1.0, 0.67);
          if (nR < 0.50) return new THREE.Color(1.0, 0.53, 0.0);
          if (nR < 0.70) return new THREE.Color(0.8, 0.14, 0.04);
          return new THREE.Color(0.3, 0.05, 0.02);
        }
        // Surface nodes use the earth map
        return getEarthColor(u, v);
      };

      const nodeVecs = [];
      const nodeDepths = [];
      const nodeUVs = [];
      const currVecs = [];

      for (let i = 0; i < NODES; i++) {
        const phi = Math.acos(-1 + (2 * i) / NODES);
        const theta = Math.sqrt(NODES * Math.PI) * phi;
        let r;
        if (Math.random() > 0.30) {
          // 92% of nodes forced into the outer shell (> 0.85) to keep the surface dense
          r = RADIUS * (0.85 + 0.15 * Math.random());
        } else {
          // Only 8% nodes inside the core to reduce middle density and opacity
          r = RADIUS * Math.cbrt(Math.random() * 0.614);
        }

        const vec = new THREE.Vector3(
          r * Math.sin(phi) * Math.cos(theta),
          r * Math.sin(phi) * Math.sin(theta),
          r * Math.cos(phi)
        );
        nodeVecs.push(vec);
        currVecs.push(vec.clone());
        nodeDepths.push(r / RADIUS);

        const v = phi / Math.PI;
        // Adjust u so that the map wraps correctly (offset by 0.5 to center continents nicely)
        let u = (theta % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI) / (2 * Math.PI);
        u = (u + 0.5) % 1.0;
        nodeUVs.push({ u, v });
      }

      const ptPos = new Float32Array(NODES * 3);
      const ptCol = new Float32Array(NODES * 3);

      for (let i = 0; i < NODES; i++) {
        const vPos = nodeVecs[i];
        ptPos[i * 3] = vPos.x;
        ptPos[i * 3 + 1] = vPos.y;
        ptPos[i * 3 + 2] = vPos.z;

        const c = layerColor(nodeDepths[i], nodeUVs[i].u, nodeUVs[i].v);
        ptCol[i * 3] = c.r;
        ptCol[i * 3 + 1] = c.g;
        ptCol[i * 3 + 2] = c.b;
      }

      const ptGeom = new THREE.BufferGeometry();
      ptGeom.setAttribute('position', new THREE.BufferAttribute(ptPos, 3));
      ptGeom.setAttribute('color', new THREE.BufferAttribute(ptCol, 3));

      const ptMat = new THREE.PointsMaterial({
        size: 2.35, // larger points for high intensity bloom
        vertexColors: true,
        map: makeGlowTexture(255, 255, 255),
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        transparent: true,
      });

      const earthPointsMesh = new THREE.Points(ptGeom, ptMat);
      earthGrp.add(earthPointsMesh);

      const lPos = [];
      const lCol = [];
      const conns = [];
      const nodeConns = Array.from({ length: NODES }, () => []);

      // Build connections. Core nodes can connect over much longer distances!
      const coreNodes = [];
      for (let i = 0; i < NODES; i++) {
        if (nodeDepths[i] < 0.85) coreNodes.push(i);
      }

      const connCounts = new Int32Array(NODES);
      for (let i = 0; i < NODES; i++) {
        for (let j = i + 1; j < NODES; j++) {
          // Limit total connections per node to keep performance high and network looking like a web rather than a solid block
          if (connCounts[i] > 18 || connCounts[j] > 18) continue;

          const d = nodeVecs[i].distanceTo(nodeVecs[j]);

          // Outer shell connects locally. Core connects broadly.
          let allowedDist = MAX_CONN;
          if (nodeDepths[i] < 0.85 || nodeDepths[j] < 0.85) {
            allowedDist = MAX_CONN * 3.5;
          }

          if (d < allowedDist) {
            // Further artificially limit deep-to-surface massive webs using chance
            if (allowedDist > MAX_CONN && Math.random() > 0.15) continue;

            lPos.push(
              nodeVecs[i].x, nodeVecs[i].y, nodeVecs[i].z,
              nodeVecs[j].x, nodeVecs[j].y, nodeVecs[j].z,
            );

            const a = Math.max(0.05, (1 - d / allowedDist)) * 0.85; // Doubled line intensity
            const ci = layerColor(nodeDepths[i], nodeUVs[i].u, nodeUVs[i].v);
            const cj = layerColor(nodeDepths[j], nodeUVs[j].u, nodeUVs[j].v);

            lCol.push(ci.r * a, ci.g * a, ci.b * a, cj.r * a, cj.g * a, cj.b * a);
            const connIdx = conns.length / 2;
            conns.push(i, j);
            nodeConns[i].push(connIdx);
            nodeConns[j].push(connIdx);
            connCounts[i]++;
            connCounts[j]++;
          }
        }
      }

      const lineGeom = new THREE.BufferGeometry();
      lineGeom.setAttribute('position', new THREE.Float32BufferAttribute(lPos, 3));
      lineGeom.setAttribute('color', new THREE.Float32BufferAttribute(lCol, 3));

      const lineMat = new THREE.LineBasicMaterial({
        vertexColors: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        transparent: true,
      });

      earthGrp.add(new THREE.LineSegments(lineGeom, lineMat));

      const sigPos = new Float32Array(N_SIGS * 3);
      const sigGeom = new THREE.BufferGeometry();
      sigGeom.setAttribute('position', new THREE.BufferAttribute(sigPos, 3));

      const sigMat = new THREE.PointsMaterial({
        size: 2,
        color: 0xff6600, // Vibrant orange
        map: makeGlowTexture(255, 255, 255, 16), // White core, color tint applied by material
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        transparent: true,
        opacity: 0.8, // Reduced opacity to limit the 'bloom' spread
      });

      earthGrp.add(new THREE.Points(sigGeom, sigMat));

      const nConns = conns.length / 2;
      // Collect connections that touch the core
      const coreConns = [];
      for (let i = 0; i < nConns; i++) {
        const nA = conns[i * 2], nB = conns[i * 2 + 1];
        if (nodeDepths[nA] < 0.6 || nodeDepths[nB] < 0.6) coreConns.push(i);
      }
      if (coreConns.length === 0) coreConns.push(0); // fallback

      const sigs = Array.from({ length: N_SIGS }, () => ({
        c: coreConns[Math.floor(Math.random() * coreConns.length)],
        t: Math.random(),
        s: 0.006 + Math.random() * 0.016,
        d: Math.random() > 0.5 ? 1 : -1,
      }));

      const raycaster = new THREE.Raycaster();
      raycaster.params.Points.threshold = 5.0;
      const mouseVec = new THREE.Vector2(-1000, -1000);
      let hoveredNode = null;

      canvas.addEventListener('mouseleave', () => {
        mouseVec.x = -1000;
        mouseVec.y = -1000;
        hoveredNode = null;
      });

      let dragGlobe = false;
      let prevGlobe = { x: 0, y: 0 };
      let userRX = 0, userRY = 0, autoY = 0;

      canvas.addEventListener('mousedown', e => {
        dragGlobe = true;
        prevGlobe = { x: e.clientX, y: e.clientY };
      });
      window.addEventListener('mouseup', () => { dragGlobe = false; });
      window.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        mouseVec.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        mouseVec.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

        if (!dragGlobe) return;
        userRY += (e.clientX - prevGlobe.x) * 0.005;
        userRX += (e.clientY - prevGlobe.y) * 0.005;
        userRX = Math.max(-1.4, Math.min(1.4, userRX));
        prevGlobe = { x: e.clientX, y: e.clientY };
      });

      canvas.addEventListener('wheel', e => {
        camera.position.z = Math.max(95, Math.min(350, camera.position.z + e.deltaY * 0.07));
      }, { passive: true });

      canvas.addEventListener('touchstart', e => {
        dragGlobe = true;
        prevGlobe = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }, { passive: true });
      window.addEventListener('touchend', () => { dragGlobe = false; });
      window.addEventListener('touchmove', e => {
        if (!dragGlobe) return;
        e.preventDefault();
        userRY += (e.touches[0].clientX - prevGlobe.x) * 0.005;
        userRX += (e.touches[0].clientY - prevGlobe.y) * 0.005;
        userRX = Math.max(-1.4, Math.min(1.4, userRX));
        prevGlobe = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }, { passive: false });

      const animateGlobe = (time) => {
        requestAnimationFrame(animateGlobe);
        const t = time * 0.001;

        autoY += AUTO_ROT;
        earthGrp.rotation.y = userRY + autoY;
        earthGrp.rotation.x = userRX;

        let magnetPoint = null;
        if (earthPointsMesh) {
          raycaster.setFromCamera(mouseVec, camera);
          const intersects = raycaster.intersectObject(earthPointsMesh);
          if (intersects.length > 0) {
            hoveredNode = intersects[0].index;
            magnetPoint = earthGrp.worldToLocal(intersects[0].point.clone());
          } else {
            hoveredNode = null;
          }
        }

        let needsGeomUpdate = false;
        const lineArr = lineGeom.attributes.position.array;

        for (let i = 0; i < NODES; i++) {
          const home = nodeVecs[i];
          const curr = currVecs[i];

          if (magnetPoint) {
            const dist = home.distanceTo(magnetPoint);
            if (dist < 25) {
              const force = (1 - dist / 25) * 18; // Bulge out by 18 units max for a stronger effect
              // Push point outward from center of earth to create a 'swelling' effect
              const dir = home.clone().normalize();
              const target = home.clone().add(dir.multiplyScalar(force));
              curr.lerp(target, 0.2);
              needsGeomUpdate = true;
            } else if (curr.distanceToSquared(home) > 0.01) {
              curr.lerp(home, 0.1);
              needsGeomUpdate = true;
            }
          } else if (curr.distanceToSquared(home) > 0.01) {
            curr.lerp(home, 0.1);
            needsGeomUpdate = true;
          }

          if (needsGeomUpdate) {
            ptPos[i * 3] = curr.x;
            ptPos[i * 3 + 1] = curr.y;
            ptPos[i * 3 + 2] = curr.z;
          }
        }

        if (needsGeomUpdate) {
          ptGeom.attributes.position.needsUpdate = true;
          for (let i = 0; i < conns.length / 2; i++) {
            const cA = conns[i * 2];
            const cB = conns[i * 2 + 1];
            lineArr[i * 6] = currVecs[cA].x;
            lineArr[i * 6 + 1] = currVecs[cA].y;
            lineArr[i * 6 + 2] = currVecs[cA].z;
            lineArr[i * 6 + 3] = currVecs[cB].x;
            lineArr[i * 6 + 4] = currVecs[cB].y;
            lineArr[i * 6 + 5] = currVecs[cB].z;
          }
          lineGeom.attributes.position.needsUpdate = true;
        }

        for (let s = 0; s < N_SIGS; s++) {
          const sg = sigs[s];
          sg.t += sg.s * sg.d;

          if (sg.t > 1 || sg.t < 0) {
            const reachedNode = sg.d > 0 ? conns[sg.c * 2 + 1] : conns[sg.c * 2];
            let nextConn = -1;
            let nextDir = 1;

            if (hoveredNode !== null) {
              let bestDist = Infinity;
              const options = nodeConns[reachedNode];
              if (options) {
                for (let i = 0; i < options.length; i++) {
                  const cIdx = options[i];
                  const nA = conns[cIdx * 2];
                  const nB = conns[cIdx * 2 + 1];
                  const otherNode = (nA === reachedNode) ? nB : nA;
                  const dist = nodeVecs[otherNode].distanceToSquared(nodeVecs[hoveredNode]);
                  if (dist < bestDist) {
                    bestDist = dist;
                    nextConn = cIdx;
                    nextDir = (nA === reachedNode) ? 1 : -1;
                  }
                }
              }
            }

            if (nextConn === -1) {
              const options = nodeConns[reachedNode];
              if (options && options.length > 0) {
                nextConn = options[Math.floor(Math.random() * options.length)];
                const nA = conns[nextConn * 2];
                nextDir = (nA === reachedNode) ? 1 : -1;
              } else {
                nextConn = coreConns[Math.floor(Math.random() * coreConns.length)];
                nextDir = Math.random() > 0.5 ? 1 : -1;
              }
            }

            sg.c = nextConn;
            sg.d = nextDir;
            sg.t = sg.d > 0 ? 0 : 1;
            sg.s = 0.006 + Math.random() * 0.018;
            if (hoveredNode !== null) sg.s *= 1.5;
          }

          const ci = conns[sg.c * 2];
          const cj = conns[sg.c * 2 + 1];
          const a = nodeVecs[ci];
          const b = nodeVecs[cj];

          sigPos[s * 3] = a.x + (b.x - a.x) * sg.t;
          sigPos[s * 3 + 1] = a.y + (b.y - a.y) * sg.t;
          sigPos[s * 3 + 2] = a.z + (b.z - a.z) * sg.t;
        }
        sigGeom.attributes.position.needsUpdate = true;
        sigMat.size = 1.5 + Math.sin(t * 3.0) * 0.5; // Very tight, small signals

        renderer.render(scene, camera);
      };

      requestAnimationFrame(animateGlobe);
    };

    // (Resize listener removed since canvas is fixed size)
  </script>
</body>

</html>
