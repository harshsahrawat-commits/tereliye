<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Off Menu - Fibonacci Rebuild</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            foreground: 'var(--foreground)',
            background: 'var(--background)',
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <!-- Lenis for smooth scrolling -->
  <script src="https://unpkg.com/@studio-freight/lenis@1.0.39/dist/lenis.min.js"></script>
  <style>
    /* CSS Variables for Theme */
    :root {
      --background: #fdfdfc;
      --foreground: #12110d;
      --color-border: #00000040;
    }

    html.dark {
      --background: #12110d;
      --foreground: #edecec;
      --color-border: #ffffff1a;
    }

    html.dark .theme-inverted {
      --background: #fdfdfc;
      --foreground: #12110d;
      --color-border: #00000040;
    }

    .theme-inverted {
      --background: #12110d;
      --foreground: #edecec;
      --color-border: #ffffff1a;
    }

    body {
      cursor: none;
      background-color: var(--background);
      color: var(--foreground);
      overflow: hidden;
      /* We are overriding scroll completely for the carousel */
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    a,
    button,
    input,
    select,
    textarea,
    .interactive {
      cursor: none !important;
    }

    /* Custom Cursor Wrapper */
    #cursor-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 99999;
      mix-blend-mode: difference;
      will-change: transform;
    }

    #cursor-dot {
      width: 10px;
      height: 10px;
      background-color: white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.3s cubic-bezier(0.25, 1, 0.5, 1), height 0.3s cubic-bezier(0.25, 1, 0.5, 1), background-color 0.3s;
      will-change: width, height;
    }

    .cursor-hover #cursor-dot {
      width: 48px;
      height: 48px;
      background-color: rgba(255, 255, 255, 1);
    }

    /* Grab cursor styling for body */
    body.grabbing #cursor-dot {
      width: 32px;
      height: 32px;
      background-color: rgba(255, 255, 255, 0.5);
    }

    /* Menu Overlay Styles */
    #nav-overlay {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 9999;
      pointer-events: none;
    }

    #nav-overlay.open {
      pointer-events: auto;
    }

    .nav-toggle-wrapper {
      pointer-events: auto;
    }

    .nav-menu-container {
      transition: width 0.3s cubic-bezier(0.85, 0, 0.15, 1), height 0.3s cubic-bezier(0.85, 0, 0.15, 1), opacity 0.2s ease;
    }

    #nav-overlay.open .nav-menu-container {
      width: 220px;
      height: auto;
      max-height: 80vh;
      opacity: 1;
      pointer-events: auto;
    }

    .nav-menu-box {
      transition: opacity 0.25s ease 0.05s, transform 0.25s ease 0.05s;
    }

    #nav-overlay.open .nav-menu-box {
      opacity: 1;
      transform: scale(1);
    }

    /* Dot Menu Toggle Morphing */
    .dot {
      transition: opacity 0.3s ease;
    }

    #nav-overlay.open .dot-2,
    #nav-overlay.open .dot-4,
    #nav-overlay.open .dot-6,
    #nav-overlay.open .dot-8 {
      opacity: 0.15 !important;
    }

    /* Carousel Elements */
    .carousel-item {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-origin: center center;
      transition: opacity 0.3s;
      will-change: transform;
    }

    .carousel-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      border-radius: 9999px;
    }

    /* Heading overlay */
    .center-heading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      /* Keep it behind the closer items */
      text-align: center;
    }

    /* Floating names */
    .project-name {
      position: absolute;
      bottom: -40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.5rem;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
      pointer-events: none;
      color: var(--foreground);
    }

    .carousel-item:hover .project-name {
      opacity: 1;
    }
  </style>
</head>

<body class="antialiased min-h-screen relative">

  <!-- Custom Cursor -->
  <div id="cursor-wrapper">
    <div id="cursor-dot"></div>
  </div>

  <!-- Header -->
  <header class="fixed top-0 left-0 right-0 z-40 p-6 md:p-8 flex justify-between items-start pointer-events-none">
    <a href="#" class="interactive text-2xl font-bold tracking-tighter pointer-events-auto">OFFMENU.</a>
  </header>

  <!-- Top Right Nav Menu -->
  <div id="nav-overlay">
    <div class="nav-toggle-wrapper absolute top-0 right-0 flex items-center gap-2 pointer-events-auto">
      <!-- Theme Toggle -->
      <button id="theme-toggle-btn"
        class="interactive w-10 h-10 flex items-center justify-center transition-transform hover:scale-110">
        <svg width="20" height="20" viewBox="0 0 20 20" class="text-foreground">
          <defs>
            <mask id="moon-mask">
              <rect x="0" y="0" width="20" height="20" fill="white"></rect>
              <circle r="7" fill="black" cx="28" cy="-4" id="moon-mask-circle"
                class="transition-all duration-500 ease-in-out"></circle>
            </mask>
          </defs>
          <circle cx="10" cy="10" r="7" fill="currentColor" mask="url(#moon-mask)"></circle>
        </svg>
      </button>

      <!-- Hamburger Button + Expanding Menu -->
      <div class="relative">
        <button id="menu-toggle-btn"
          class="interactive relative z-20 w-10 h-10 flex items-center justify-center transition-transform hover:scale-110">
          <svg class="text-foreground" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="4" cy="4" r="2" class="dot dot-1"></circle>
            <circle cx="12" cy="4" r="2" class="dot dot-2"></circle>
            <circle cx="20" cy="4" r="2" class="dot dot-3"></circle>
            <circle cx="4" cy="12" r="2" class="dot dot-4"></circle>
            <circle cx="12" cy="12" r="2" class="dot dot-5"></circle>
            <circle cx="20" cy="12" r="2" class="dot dot-6"></circle>
            <circle cx="4" cy="20" r="2" class="dot dot-7"></circle>
            <circle cx="12" cy="20" r="2" class="dot dot-8"></circle>
            <circle cx="20" cy="20" r="2" class="dot dot-9"></circle>
          </svg>
        </button>

        <!-- Expanding Menu Dropdown from Button -->
        <div class="nav-menu-container absolute top-full right-0 pt-2 w-0 h-0 overflow-hidden pointer-events-none transition-all duration-300 ease-out z-30"
             style="transform-origin: top right;">
          <div class="nav-menu-box bg-background border border-foreground/10 rounded-2xl shadow-xl px-4 py-3 min-w-[200px] opacity-0 scale-95 transition-all duration-300 ease-out"
               style="transform-origin: top right;">
            <div class="group/links flex flex-col gap-0 text-foreground text-sm leading-tight font-medium [&_a]:py-1.5 [&:has(a:not(.current):hover)_a:not(.current):not(:hover)]:text-foreground/50 [&_a]:transition-colors duration-100">
              <a class="interactive current opacity-50 pointer-events-none" href="/">Work</a>
              <a class="interactive" href="/services">Services</a>
              <a class="interactive" href="/pricing">Pricing</a>
              <a class="interactive" href="/approach">Approach</a>
              <a class="interactive" href="#">Book a Call</a>
            </div>
            <div className="h-px w-full bg-foreground/10 my-2"></div>
            <div class="flex flex-col gap-0 text-foreground text-xs leading-relaxed font-medium">
              <span class="text-foreground/50 mb-1 text-[9px] tracking-wide uppercase font-semibold">Resources</span>
              <div class="group/resources flex flex-col gap-0 [&_a]:py-1 hover:[&_a]:text-foreground/50 hover:[&_a:hover]:text-foreground [&_a]:transition-colors duration-200">
                <a class="interactive" href="/blog">Writing</a>
                <a class="interactive" href="https://x.com/weareoffmenu" target="_blank" rel="noopener noreferrer">Twitter / X</a>
                <a class="interactive" href="https://linkedin.com/company/offmenudesign" target="_blank" rel="noopener noreferrer">LinkedIn</a>
                <a class="interactive" href="/terms">Terms of Service</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

    <!-- Menu Content -->
    <div class="nav-menu-content pointer-events-auto">
      <div class="nav-menu-inner flex flex-col p-1.5 overflow-hidden gap-1.5">
        <div
          class="group/links flex flex-col gap-0 text-foreground text-sm leading-tight font-medium [&_a]:pb-0.5 [&:has(a:not(.current):hover)_a:not(.current):not(:hover)]:text-foreground/50 [&_a]:transition-colors duration-100">
          <a class="interactive current opacity-50 pointer-events-none" href="/">Work</a>
          <a class="interactive" href="/services">Services</a>
          <a class="interactive" href="/pricing">Pricing</a>
          <a class="interactive" href="/approach">Approach</a>
          <a class="interactive" href="#">Book a Call</a>
        </div>
        <div class="divider w-full h-2 shrink-0">
          <div class="divider-line w-full h-1/2 border-b border-foreground/10"></div>
        </div>
        <div class="flex flex-col gap-0.5 text-foreground text-xs leading-none tracking-relaxed font-medium">
          <span class="text-foreground/50 mb-0.5 text-[9px] tracking-wide uppercase font-semibold">Resources</span>
          <div
            class="group/resources flex flex-col gap-0 [&_a]:pb-1 hover:[&_a]:text-foreground/50 hover:[&_a:hover]:text-foreground [&_a]:transition-colors duration-200">
            <a class="interactive" href="/blog">Writing</a>
            <a class="interactive" href="https://x.com/weareoffmenu" target="_blank" rel="noopener noreferrer">Twitter /
              X</a>
            <a class="interactive" href="https://linkedin.com/company/offmenudesign" target="_blank"
              rel="noopener noreferrer">LinkedIn</a>
            <a class="interactive" href="/terms">Terms of Service</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Central Heading (behind carousel) -->
  <div class="center-heading flex flex-col items-center gap-1 w-full px-4">
    <h1 class="text-2xl md:text-3xl lg:text-4xl font-medium leading-tight tracking-tight text-center max-w-2xl">
      AI-native studio building brands and web experiences for high-growth startups
    </h1>
  </div>

  <!-- Carousel Area -->
  <main id="carousel-container" class="absolute inset-0 w-full h-full flex items-center justify-center touch-none">
    <div id="carousel-track" class="relative w-full h-full">
      <!-- Items generated by JS -->
    </div>
  </main>

  <script>
    /* =========================================================================
       1. Custom Cursor & Interactive Logic
       ========================================================================= */
    const cursorWrapper = document.getElementById('cursor-wrapper');
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let cursorX = mouseX;
    let cursorY = mouseY;

    window.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      if (cursorWrapper.style.opacity === "0") cursorWrapper.style.opacity = "1";
    });

    document.addEventListener("mouseleave", () => { cursorWrapper.style.opacity = "0"; });
    document.addEventListener("mouseenter", () => { cursorWrapper.style.opacity = "1"; });

    function bindInteractiveCursor() {
      const interactiveElements = document.querySelectorAll('a, button, input, .interactive, .carousel-item');
      interactiveElements.forEach(el => {
        el.removeEventListener('mouseenter', addHover);
        el.removeEventListener('mouseleave', removeHover);
        el.addEventListener('mouseenter', addHover);
        el.addEventListener('mouseleave', removeHover);
      });
    }

    function addHover() { cursorWrapper.classList.add('cursor-hover'); }
    function removeHover() { cursorWrapper.classList.remove('cursor-hover'); }

    function animateCursor() {
      cursorX += (mouseX - cursorX) * 0.15;
      cursorY += (mouseY - cursorY) * 0.15;
      cursorWrapper.style.transform = `translate3d(${cursorX}px, ${cursorY}px, 0)`;
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    /* =========================================================================
       2. Theme Toggle & Nav Menu
       ========================================================================= */
    const themeBtn = document.getElementById('theme-toggle-btn');
    const menuBtn = document.getElementById('menu-toggle-btn');
    const navOverlay = document.getElementById('nav-overlay');
    const htmlEl = document.documentElement;
    const moonCircle = document.getElementById('moon-mask-circle');

    themeBtn.addEventListener('click', () => {
      if (htmlEl.classList.contains('dark')) {
        htmlEl.classList.remove('dark');
        moonCircle.style.transform = 'translate(-13px, 9px)';
      } else {
        htmlEl.classList.add('dark');
        moonCircle.style.transform = 'translate(0px, 0px)';
      }
    });

    menuBtn.addEventListener('click', () => {
      navOverlay.classList.toggle('open');
    });

    // Close menu when clicking outside
    document.addEventListener('click', (e) => {
      if (navOverlay.classList.contains('open') && !navOverlay.contains(e.target) && e.target !== menuBtn && !menuBtn.contains(e.target)) {
        navOverlay.classList.remove('open');
      }
    });

    /* =========================================================================
       3. 3D Fibonacci Logarithmic Spiral Carousel
       ========================================================================= */
    const track = document.getElementById('carousel-track');

    // Project Data
    const projects = [
      { name: 'Resonant', src: 'images/work/resonant/thumbnail-light-xs@2x.webp', url: 'work/resonant.html' },
      { name: 'Control Tower', src: 'images/work/controltower/thumbnail-light-xs@2x.webp', url: 'work/controltower.html' },
      { name: 'Ditto', src: 'images/work/ditto/thumbnail-light-xs@2x.webp', url: 'work/ditto.html' },
      { name: 'Hanover Park', src: 'images/work/hanover-park/thumbnail-light-xs@2x.webp', url: 'work/hanover-park.html' },
      { name: 'Superintelligent', src: 'images/work/super/thumbnail-light-xs@2x.webp', url: 'work/super.html' },
      { name: 'Tenacity', src: 'images/work/tenacity/thumbnail-light-xs@2x.webp', url: 'work/tenacity.html' },
      { name: 'Utility', src: 'images/work/utility/thumbnail-light-xs@2x.webp', url: 'work/utility.html' },
      { name: 'Flex', src: 'images/work/flex/thumbnail-light-xs@2x.webp', url: 'work/flex.html' },
      { name: 'ClosetNow', src: 'images/work/closetnow/closetnow-gallery-01@2x.webp', url: 'work/closetnow.html' }
    ];

    // Create DOM elements
    const itemElements = projects.map((proj, i) => {
      const a = document.createElement('a');
      a.className = 'carousel-item interactive block';
      a.href = proj.url;
      a.style.width = 'clamp(150px, 30vw, 400px)';
      a.style.height = 'clamp(150px, 30vw, 400px)';

      const img = document.createElement('img');
      img.src = proj.src;
      img.alt = proj.name;

      const name = document.createElement('div');
      name.className = 'project-name';
      name.innerText = proj.name;

      a.appendChild(img);
      a.appendChild(name);
      track.appendChild(a);
      return a;
    });

    bindInteractiveCursor();

    // Carousel Physics
    let targetRotation = 0;
    let currentRotation = 0;
    let isDragging = false;
    let startX = 0;
    let startY = 0;

    // Update positions
    function updateCarousel() {
      // Lerp rotation for smooth momentum
      currentRotation += (targetRotation - currentRotation) * 0.08;

      const total = itemElements.length;
      const maxRadius = Math.max(window.innerWidth, window.innerHeight) * 0.6;

      itemElements.forEach((el, i) => {
        // Compute position along the continuous spiral loop
        let p = (currentRotation + i) % total;
        if (p < 0) p += total; // Keep it positive

        let n = p / total; // Normalized progress from 0.0 to 1.0

        // Logarithmic Spiral / Fibonacci curve math:
        // n=0 is in the deep background (center). n=1 is in the foreground (edges).

        // Theta controls the rotation angle. Spanning 1.5 rotations (Math.PI * 3)
        // We add an offset so items sweep dramatically from the back-right to the front-left
        const angleOffset = -Math.PI / 2;
        const theta = n * Math.PI * 3 + angleOffset;

        // Exponentially expanding radius matching a Golden Spiral
        const radius = maxRadius * ((Math.exp(n * 2.5) - 1) / (Math.exp(2.5) - 1));

        // Compress the Y axis to create a 3D tilted effect
        const px = Math.cos(theta) * radius;
        const py = Math.sin(theta) * radius * 0.75;

        // Scale simulates the Z-depth (items in the center are tiny, items at edges are huge)
        const scale = 0.1 + Math.pow(n, 2.5) * 1.5;

        // Calculate Opacity:
        // Fade in gracefully from the very center abyss
        // Fade out gracefully before they leave the viewport completely
        let opacity = 1;
        if (n < 0.1) opacity = n / 0.1;
        else if (n > 0.8) opacity = (1 - n) / 0.2;

        // Apply styling
        el.style.transform = `translate(-50%, -50%) translate3d(${px}px, ${py}px, 0) scale(${scale})`;
        el.style.zIndex = Math.round(n * 100);
        el.style.opacity = opacity;
      });

      requestAnimationFrame(updateCarousel);
    }

    updateCarousel();

    // Interaction Events
    const container = document.getElementById('carousel-container');

    // Scroll (Wheel)
    window.addEventListener('wheel', (e) => {
      // Adding to targetRotation makes scrolling down bring items from background to foreground
      targetRotation += e.deltaY * 0.002;
      targetRotation += e.deltaX * 0.002;
    }, { passive: true });

    // Drag / Touch
    container.addEventListener('pointerdown', (e) => {
      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
      document.body.classList.add('grabbing');
      cursorWrapper.classList.remove('cursor-hover');
    });

    window.addEventListener('pointermove', (e) => {
      if (!isDragging) return;

      const deltaX = e.clientX - startX;
      const deltaY = e.clientY - startY;

      // Dragging moves the spiral forward or backward
      targetRotation += (deltaX - deltaY) * 0.005;

      startX = e.clientX;
      startY = e.clientY;
    });

    window.addEventListener('pointerup', () => {
      isDragging = false;
      document.body.classList.remove('grabbing');
    });

    window.addEventListener('pointerleave', () => {
      isDragging = false;
      document.body.classList.remove('grabbing');
    });

  </script>
</body>

</html>
